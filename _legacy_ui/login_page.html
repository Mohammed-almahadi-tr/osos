<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-tertiary/10 blur-[100px]"></div>
</div>
<main class="relative z-10 w-full max-w-[460px]">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(26,28,28,0.06)] overflow-hidden">
<div class="p-8 md:p-12">
<div class="flex flex-col items-center mb-10">
<div class="mb-6 h-20 w-auto flex items-center justify-center">
<img alt="شعار معهد التدريب" class="h-full object-contain" data-alt="professional modern minimalist institute logo featuring abstract geometric shapes in gold and charcoal against a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYUXxiy5u7tKI3PP5sXBg1Otp3MSIOmpKCX1R_owoG-BZnuo1c84AfmL8xoEeE402UrlXKJUnx4-hECBLwN_dAnrvvxJd0JPWoUbh76XjxLDetca0CB9mYjIi_U3d2TZlrXusy8us7LWoO-sWpgBlszc7Xe44hl2GxfhKewFTD6N0OYxrLu7ryfJcS2vjtNBQ_MpPeCb_aebF5efV3lNm0SXvKsxD_8XfNVWB3OG_2UqaB5reoiDiqRrqxrzdKQ-WaYOUWIMtOU2if"/>
</div>
<h1 class="text-2xl font-headline font-bold text-on-surface tracking-tight text-center mb-2">
                        مرحبا بكم في نظام إدارة الحضور
                    </h1>
<p class="text-on-surface-variant font-body text-sm text-center">
                        يرجى إدخال بيانات الاعتماد الخاصة بك للوصول إلى لوحة الإدارة
                    </p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant pr-1" for="username">
                            اسم المستخدم
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<input class="block w-full pr-12 pl-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-200" id="username" name="username" placeholder="أدخل اسم المستخدم" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant pr-1" for="password">
                            كلمة المرور
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pr-12 pl-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between py-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-low" id="remember-me" name="remember-me" type="checkbox"/>
<label class="mr-2 block text-sm text-on-surface-variant" for="remember-me">
                                تذكرني
                            </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">
                                نسيت كلمة المرور؟
                            </a>
</div>
</div>
<div class="pt-4">
<button class="w-full editorial-gradient text-white font-headline font-bold py-4 px-6 rounded-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>تسجيل الدخول</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</div>
</form>
</div>
<div class="bg-surface-container-low px-8 py-6 flex justify-center items-center">
<p class="text-xs text-on-secondary-container flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
                    نظام آمن ومشفر لإدارة بيانات المعهد
                </p>
</div>

<footer class="mt-8 text-center text-on-surface-variant/60 text-xs">
